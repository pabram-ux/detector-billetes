<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzE6-SiFg-FugJonDvkbunz_xjXCb-0c-5w7kH1ukoQgLq98xFy3bGyqFd4x_DpB94T/exec";

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const status = document.getElementById('status');
        const btn = document.getElementById('uploadBtn');
        const file = document.getElementById('fileInput').files[0];

        status.innerHTML = "Escaneando billete...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = async function() {
            const base64Data = reader.result.split(',')[1];
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ image: base64Data, mimeType: file.type })
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    if (!result.circulable) {
                        status.innerHTML = `<h1 style="color: red;">${result.mensaje}</h1>
                                            <p>Serie: ${result.serie}</p>`;
                        document.body.style.backgroundColor = "#ffe6e6"; // Fondo rojo de alerta
                    } else {
                        status.innerHTML = `<h1 style="color: green;">${result.mensaje}</h1>
                                            <p>Serie detectada: ${result.serie}</p>`;
                        document.body.style.backgroundColor = "#e6fffa";
                    }
                }
            } catch (e) {
                status.innerText = "Error en el escaneo.";
            } finally {
                btn.disabled = false;
            }
        };
        reader.readAsDataURL(file);
    });
</script>
